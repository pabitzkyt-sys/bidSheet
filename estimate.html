<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Estimate</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topbar">
    <a href="index.html" style="color:#e5e7eb;text-decoration:none;">← Back</a>
    <h1>New Estimate</h1>
    <div class="version">Estimator</div>
</header>

<main class="dashboard">

    <!-- JOB INFO -->
    <section class="recentCard">
        <h2>Job Information</h2>

        <input id="jobName" placeholder="Job Name">
        <input id="customer" placeholder="Customer Name">
        <input id="address" placeholder="Job Address">
        <input id="contact" placeholder="Contact Info">

        <div class="row">
            <input id="elevators" type="number" placeholder="# Elevators">
            <input id="groups" type="number" placeholder="# Groups">
        </div>
    </section>

    <!-- LABOR -->
    <section class="recentCard">
        <h2>Labor</h2>

        <div class="row">
            <input id="weeks" type="number" placeholder="Weeks">
            <input id="hoursPerWeek" type="number" placeholder="Hours/Week">
        </div>

        <div class="row">
            <input id="laborRate" type="number" placeholder="Labor Rate ($/hr)">
        </div>

        <p>Labor Hours: <span id="laborHours">0</span></p>
        <p>Labor Cost: $<span id="laborCost">0</span></p>
    </section>

    <!-- PARTS -->
    <section class="recentCard">
        <h2>Parts</h2>

        <button onclick="addPart()">+ Add Part</button>

        <table>
            <thead>
                <tr>
                    <th>Part</th>
                    <th>Qty</th>
                    <th>Cost</th>
                    <th>Tax %</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="partsBody"></tbody>
        </table>

        <p>Parts Total: $<span id="partsTotal">0</span></p>
    </section>

    <!-- SUMMARY -->
    <section class="recentCard">
        <h2>Summary</h2>

        <label>Profit Margin (%)</label>
        <input id="profit" type="number">

        <p>Subtotal: $<span id="subtotal">0</span></p>
        <p>Profit: $<span id="profitValue">0</span></p>

        <h2>Total: $<span id="grandTotal">0</span></h2>
    </section>

</main>

<script src="js/storage.js"></script>
<script src="js/estimate.js"></script>

</body>
</html>
