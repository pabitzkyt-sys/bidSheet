<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Sheet</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
</head>

<body>

<header class="topbar">
    <h1>Bid Sheet</h1>
    <div class="version">Version 1.0</div>
</header>

<main class="dashboard">

    <section class="welcomeCard">
        <h2>Welcome</h2>
        <p>Select what you'd like to do.</p>
    </section>

    <section class="buttonGrid">

        <a href="estimate.html" class="menuButton">
            <div class="icon">📄</div>
            <h3>New Estimate</h3>
            <p>Create a new estimate.</p>
        </a>

        <a href="customers.html" class="menuButton">
            <div class="icon">👥</div>
            <h3>Customers</h3>
            <p>Manage customer list.</p>
        </a>

        <a href="parts.html" class="menuButton">
            <div class="icon">📦</div>
            <h3>Parts Library</h3>
            <p>Edit material pricing.</p>
        </a>

        <a href="settings.html" class="menuButton">
            <div class="icon">⚙️</div>
            <h3>Settings</h3>
            <p>Labor rates, tax, company info.</p>
        </a>

    </section>

    <section class="recentCard">

        <div class="cardHeader">
            <h2>Recent Estimates</h2>
            <button id="clearRecent">Clear</button>
        </div>

        <ul id="recentList">
            <li>No recent estimates yet.</li>
        </ul>

    </section>

</main>

<script src="js/app.js"></script>

</body>
</html>
